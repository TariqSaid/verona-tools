<!-- PAGE LOADER — Animated Logo Redesign Loop -->
<div id="page-loader">
  <div class="loader-logo">
    <!-- Animated SVG: Logo redraws itself continuously -->
    <div class="logo-anim-container">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240" class="logo-anim-svg">
        <defs>
          <linearGradient id="bagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2DD4F0"/>
            <stop offset="100%" style="stop-color:#22B8CF"/>
          </linearGradient>
          <style>
            .bag-body {
              fill: none;
              stroke: #22B8CF;
              stroke-width: 2.5;
              stroke-linecap: round;
              stroke-linejoin: round;
              stroke-dasharray: 400;
              stroke-dashoffset: 400;
              animation: drawBag 1.8s ease forwards, holdStroke 1.6s linear 1.8s forwards, undrawBag 1.2s ease 3.4s forwards;
              animation-iteration-count: infinite;
            }
            .bag-fill {
              fill: url(#bagGrad);
              fill-opacity: 0;
              animation: fadeInFill 0.5s ease 1.5s forwards, fadeOutFill 0.4s ease 3.2s forwards;
              animation-iteration-count: infinite;
            }
            .handle {
              fill: none;
              stroke: #22B8CF;
              stroke-width: 3;
              stroke-linecap: round;
              stroke-dasharray: 100;
              stroke-dashoffset: 100;
              animation: drawHandle 0.6s ease 0.4s forwards, undrawHandle 0.5s ease 3.7s forwards;
              animation-iteration-count: infinite;
            }
            .fold-line {
              fill: none;
              stroke: #1A9AAE;
              stroke-width: 2;
              stroke-linecap: round;
              stroke-dasharray: 80;
              stroke-dashoffset: 80;
              animation: drawFold 0.7s ease 1.2s forwards, undrawFold 0.5s ease 3.5s forwards;
              animation-iteration-count: infinite;
            }
            .speed-line {
              fill: none;
              stroke: #22B8CF;
              stroke-width: 3.5;
              stroke-linecap: round;
              stroke-dasharray: 60;
              stroke-dashoffset: 60;
              animation: drawLine 0.4s ease forwards, undrawLine 0.3s ease 3.6s forwards;
              animation-iteration-count: infinite;
            }
            .speed-line:nth-of-type(1) { animation-delay: 0.8s, 3.8s; }
            .speed-line:nth-of-type(2) { animation-delay: 1.0s, 3.6s; }
            .speed-line:nth-of-type(3) { animation-delay: 1.2s, 3.4s; }
            .logo-text-verona {
              font-family: 'Inter', 'Arial Black', sans-serif;
              font-weight: 900;
              font-size: 26px;
              fill: #ffffff;
              opacity: 0;
              animation: textReveal 0.5s ease 1.6s forwards, textHide 0.3s ease 3.1s forwards;
              animation-iteration-count: infinite;
            }
            .logo-text-tools {
              font-family: 'Inter', Arial, sans-serif;
              font-weight: 700;
              font-size: 12px;
              fill: #22B8CF;
              letter-spacing: 4px;
              opacity: 0;
              animation: textReveal 0.4s ease 1.9s forwards, textHide 0.3s ease 3.0s forwards;
              animation-iteration-count: infinite;
            }
            .brand-dot {
              fill: #22B8CF;
              opacity: 0;
              animation: dotReveal 0.3s ease 2.1s forwards, dotHide 0.2s ease 2.9s forwards;
              animation-iteration-count: infinite;
            }
            @keyframes drawBag { to { stroke-dashoffset: 0; } }
            @keyframes undrawBag { to { stroke-dashoffset: -400; } }
            @keyframes drawHandle { to { stroke-dashoffset: 0; } }
            @keyframes undrawHandle { to { stroke-dashoffset: -100; } }
            @keyframes drawFold { to { stroke-dashoffset: 0; } }
            @keyframes undrawFold { to { stroke-dashoffset: -80; } }
            @keyframes drawLine { to { stroke-dashoffset: 0; } }
            @keyframes undrawLine { to { stroke-dashoffset: -60; } }
            @keyframes fadeInFill { to { fill-opacity: 0.85; } }
            @keyframes fadeOutFill { to { fill-opacity: 0; } }
            @keyframes textReveal { to { opacity: 1; } }
            @keyframes textHide { to { opacity: 0; } }
            @keyframes dotReveal { to { opacity: 1; } }
            @keyframes dotHide { to { opacity: 0; } }
            @keyframes holdStroke { }
          </style>
        </defs>
        <!-- Speed lines -->
        <line class="speed-line" x1="15" y1="82" x2="65" y2="82"/>
        <line class="speed-line" x1="10" y1="96" x2="75" y2="96"/>
        <line class="speed-line" x1="18" y1="110" x2="62" y2="110"/>
        <!-- Bag fill -->
        <path class="bag-fill" d="M 68,72 L 148,72 L 155,130 Q 156,138 148,140 L 92,140 Q 84,140 80,132 L 64,88 Q 62,80 66,74 Q 67,72 68,72 Z"/>
        <!-- Bag outline -->
        <path class="bag-body" d="M 68,72 L 148,72 L 155,130 Q 156,138 148,140 L 92,140 Q 84,140 80,132 L 64,88 Q 62,80 66,74 Q 67,72 68,72 Z"/>
        <!-- Diagonal fold line -->
        <path class="fold-line" d="M 66,92 Q 105,110 145,102"/>
        <!-- Handle -->
        <path class="handle" d="M 92,72 L 92,58 Q 92,44 108,44 Q 124,44 124,58 L 124,72"/>
        <!-- Decorative dot -->
        <circle class="brand-dot" cx="108" cy="44" r="2.5"/>
        <!-- VERONA text -->
        <text class="logo-text-verona" x="100" y="190" text-anchor="middle">VERONA</text>
        <!-- TOOLS text -->
        <text class="logo-text-tools" x="100" y="208" text-anchor="middle">TOOLS</text>
      </svg>
    </div>
    <div style="color:#fff;font-weight:900;font-size:22px;letter-spacing:-0.5px;">VERONA <span style="color:#22B8CF;">TOOLS</span></div>
    <div style="display:flex;gap:6px;margin-top:4px;">
      <span style="width:6px;height:6px;border-radius:50%;background:#22B8CF;animation:loaderDot 1.2s ease-in-out infinite"></span>
      <span style="width:6px;height:6px;border-radius:50%;background:#22B8CF;animation:loaderDot 1.2s ease-in-out 0.2s infinite"></span>
      <span style="width:6px;height:6px;border-radius:50%;background:#22B8CF;animation:loaderDot 1.2s ease-in-out 0.4s infinite"></span>
    </div>
  </div>
</div>
